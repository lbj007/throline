    <line x1="80" y1="640" x2="742" y2="640" stroke="#23262b"/>
    <g stroke="#1a1d22"><line x1="80" y1="560" x2="742" y2="560"/><line x1="80" y1="470" x2="742" y2="470"/><line x1="80" y1="380" x2="742" y2="380"/></g>
    <!-- area -->
    <path d="M90 600 L150 580 L210 588 L270 540 L330 552 L390 500 L450 470 L510 486 L570 430 L630 410 L690 360 L744 332 L744 640 L90 640 Z" fill="#CDF564" fill-opacity="0.10"/>
    <path d="M90 600 L150 580 L210 588 L270 540 L330 552 L390 500 L450 470 L510 486 L570 430 L630 410 L690 360 L744 332" fill="none" stroke="#CDF564" stroke-width="2.5"/>
    <g fill="#CDF564"><circle cx="690" cy="360" r="4"/><circle cx="744" cy="332" r="4"/></g>
    <g fill="#3a3d42" font-size="11"><text x="86" y="664">1月</text><text x="320" y="664">6月</text><text x="690" y="664">12月</text></g>
  </g>

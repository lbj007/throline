      <rect x="52" y="128" width="150" height="26" rx="5" fill="#2a2d33"/><text x="60" y="147" fill="#9A998F" font-size="13">¥ ▮▮.▮ M 脱敏</text>
      <text x="52" y="184" fill="#CDF564" font-size="12">▲ 12.4% 环比</text>
    </g>
    <g>
      <rect x="318" y="84" width="270" height="118" rx="10" fill="#15181D" stroke="#23262b"/>

      <text x="338" y="160" fill="#E9E6DE" font-size="34" font-weight="700">86.2%</text>
      <text x="338" y="184" fill="#CDF564" font-size="12">▲ 3.1 pt</text>
    </g>
    <g>
      <rect x="604" y="84" width="270" height="118" rx="10" fill="#15181D" stroke="#23262b"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" font-family="'IBM Plex Mono',ui-monospace,'PingFang SC',monospace">
  <rect width="1200" height="740" fill="#0B0C0E"/>
  <rect x="1" y="1" width="1198" height="738" fill="none" stroke="#23262b" stroke-width="1"/>
  <!-- top bar -->
  <g>
    <rect x="0" y="0" width="1200" height="56" fill="#101216"/>
    <circle cx="28" cy="28" r="5" fill="#CDF564"/><circle cx="46" cy="28" r="5" fill="#3a3d42"/><circle cx="64" cy="28" r="5" fill="#3a3d42"/>
    <text x="96" y="33" fill="#E9E6DE" font-size="15" font-weight="600">业务总览 · SALES BOARD</text>
    <text x="980" y="33" fill="#67675F" font-size="12">实时 · 自动刷新</text>
    <circle cx="1150" cy="28" r="4" fill="#CDF564"/>
  </g>
  <!-- KPI cards -->
  <g>
    <!-- card template -->
    <g>
      <rect x="32" y="84" width="270" height="118" rx="10" fill="#15181D" stroke="#23262b"/>

      <text x="910" y="184" fill="#67675F" font-size="12">— 持平</text>
    </g>
  </g>
  <!-- trend chart -->
  <g>
    <rect x="32" y="224" width="742" height="468" rx="10" fill="#101216" stroke="#23262b"/>
    <text x="56" y="262" fill="#E9E6DE" font-size="15" font-weight="600">营收走势 · 近 12 月</text>

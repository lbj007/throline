      <rect x="898" y="424" width="162" height="48" rx="6" fill="#2f333a"/><text x="979" y="453" fill="#C9C7BE" font-size="13">商机 ▮▮%</text>
      <rect x="922" y="488" width="114" height="48" rx="6" fill="#7e9a3e"/><text x="979" y="517" fill="#0B0C0E" font-size="13">试听 ▮▮%</text>
